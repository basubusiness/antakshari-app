<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Antakshari AI 2026</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>

#buzzerOverlay{
animation: buzzFlash 0.9s ease;
}
    
body { 



@keyframes buzzFlash{
0%{opacity:0; transform:scale(0.96);}
20%{opacity:1; transform:scale(1);}
60%{opacity:1; transform:scale(1);}
100%{opacity:0; transform:scale(1.02);}
}


    
touch-action: manipulation; 
overflow: hidden; 
overscroll-behavior: none; 
}

button{
touch-action: manipulation;
-webkit-tap-highlight-color: transparent;
}

.pulse { animation: pulse 1.5s infinite; }

@keyframes pulse {
0%,100%{transform:scale(1);opacity:1;}
50%{transform:scale(1.1);opacity:.8;}
}

.animate-fadeIn { animation: fadeIn 0.3s ease-in; }

@keyframes fadeIn{
from{opacity:0;transform:translateY(-10px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<div id="buzzerOverlay" class="fixed inset-0 bg-red-700 bg-opacity-90 hidden flex items-center justify-center z-50">
    <div class="text-center">
        <div class="text-7xl font-black mb-4">❌</div>
        <div id="buzzerText" class="text-2xl font-bold"></div>
    </div>
</div>    

<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col items-center p-6">

<header class="text-center mb-6">
<h1 class="text-4xl font-bold text-yellow-400 tracking-tight">Antakshari AI</h1>
<p class="text-slate-400 text-sm">Lightweight Social Edition</p>
</header>

<div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border border-slate-700 relative">

<div class="w-full bg-slate-700 h-1.5 rounded-full mb-6 overflow-hidden">
<div id="timerBar" class="bg-yellow-500 h-full w-0 transition-all duration-100"></div>
</div>

<div class="mb-4">
<span class="text-xs uppercase tracking-[0.2em] text-slate-500 font-bold">Current Letter</span>
<div id="currentLetter" class="text-9xl font-black text-white mt-2 transition-all">M</div>
</div>

<button id="micBtn" class="bg-yellow-500 hover:bg-yellow-400 text-slate-900 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 transition-all active:scale-95 shadow-lg">
<svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" viewBox="0 0 20 20" fill="currentColor">
<path d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 005 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-2v-2.07z"/>
</svg>
</button>

<p id="status" class="text-yellow-200 italic h-12 mb-4 text-sm font-medium px-4 flex items-center justify-center leading-tight">
Tap to start singing...
</p>

<div class="flex gap-2 justify-center">
<button onclick="endSong()" class="text-xs bg-yellow-700 hover:bg-yellow-600 px-4 py-2 rounded-full text-white">End</button>
<button onclick="skipLetter()" class="text-xs bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-full text-slate-300">Skip</button>
<button onclick="resetGame()" class="text-xs bg-red-900/30 hover:bg-red-900/50 px-4 py-2 rounded-full text-red-400 border border-red-900/50">Reset</button>
</div>
    
</div>

<div class="mt-8 w-full max-w-md overflow-hidden">
<h3 class="text-sm font-bold mb-4 text-slate-500 uppercase tracking-widest">Played Songs</h3>
<ul id="history" class="space-y-2 max-h-60 overflow-y-auto pr-2"></ul>
</div>

<script>

function buzzWrong(firstWord){

status.innerText=`❌ Wrong start! Heard "${firstWord}"`;

buzzerText.innerText=`Heard: "${firstWord}"`;

buzzerOverlay.style.animation = "none";
buzzerOverlay.offsetHeight; 
buzzerOverlay.style.animation = null;
buzzerOverlay.classList.remove("hidden");

const ctx = new (window.AudioContext || window.webkitAudioContext)();

function playNote(freq, start, duration){
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0.12, ctx.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + duration);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start(ctx.currentTime + start);
    osc.stop(ctx.currentTime + start + duration);
}

playNote(660, 0.00, 0.15);   // E
playNote(550, 0.15, 0.15);   // C#
playNote(440, 0.30, 0.20);   // A

    
recognition.abort();

setTimeout(()=>{

buzzerOverlay.classList.add("hidden");

if(gameState.isRecording){
gameState.waitingForRestart=false;
gameState.firstWordCaptured = false;
recognition.start();
}

},900);

}

function startTimer(){

gameState.timerInterval = setInterval(()=>{

gameState.timeLeft -= .1;

timerBar.style.width =
((GAME_CONFIG.TURN_TIME-gameState.timeLeft)/GAME_CONFIG.TURN_TIME)*100+"%";

if(gameState.timeLeft<=0){

status.innerText="Time Up! Next player.";
stopSinging();

}

},100);

}

function stopTimer(){

clearInterval(gameState.timerInterval);

timerBar.style.width="0%";

}

    

const GAME_CONFIG = {
TURN_TIME: 30,
MAX_ATTEMPTS: 3
};

const alphabets = {
latin: "ABCDEFGHIJKLMNOPQRSTUVWXYZ"
};

const alphabet = alphabets.latin;

const gameState = {
currentLetter: "M",
usedSongs: new Set(),
isRecording: false,
timerInterval: null,
timeLeft: GAME_CONFIG.TURN_TIME,
attempts: 0,
waitingForRestart: false,
firstWordCaptured: false,
songValidated: false,
currentTranscript: "",
linesDetected: 0,
lastSpeechTime: 0,
lastLineText: "",
lastPhrase: "",
silenceTimer: null
};

const phoneticMap = { 
'म':'M','न':'N','क':'K','ख':'K','ग':'G','घ':'G',
'च':'C','छ':'C','ज':'J','झ':'J','त':'T','थ':'T',
'द':'D','ध':'D','प':'P','ब':'B','भ':'B','व':'V',
'य':'Y','र':'R','ल':'L','स':'S','ह':'H','अ':'A','आ':'A'
};

const fillers = ["अह","उम","ओह","UH","UM","OH","THE"];

const bFamily = ['ब','भ','व','प','फ','B','V','P'];
const tFamily = ['त','थ','ट','ठ','T','D','द','ध','ड','ढ'];

const micBtn = document.getElementById('micBtn');
const status = document.getElementById('status');
const letterDisplay = document.getElementById('currentLetter');
const historyList = document.getElementById('history');
const timerBar = document.getElementById('timerBar');
const buzzerOverlay = document.getElementById('buzzerOverlay');
const buzzerText = document.getElementById('buzzerText');

    
function updateUI(){
letterDisplay.innerText = gameState.currentLetter;
}

function normalizeSong(song){
return song.toLowerCase().replace(/[^a-z0-9]/g,'');
}

function getRandomLetter(){
const index = Math.floor(Math.random()*alphabet.length);
return alphabet[index];
}

function restartRecognition(){
    recognition.abort();
    setTimeout(()=>{
    if(gameState.isRecording){
        gameState.waitingForRestart = false;
        recognition.start();
    }
},150);
}

function createSpeechEngine(){
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
return new SpeechRecognition();
}

const recognition = createSpeechEngine();
recognition.lang = 'hi-IN';
recognition.continuous = true;
recognition.interimResults = true;
recognition.maxAlternatives = 1;

micBtn.onclick = () => {
if(!gameState.isRecording) startSinging();
else stopSinging();
};

function startSinging(){

gameState.attempts = 0;
gameState.waitingForRestart = false;
gameState.firstWordCaptured = false;
gameState.songValidated = false;
gameState.currentTranscript = "";
gameState.linesDetected = 0;
gameState.lastLineText = "";
gameState.lastSpeechTime = Date.now();
gameState.isRecording = true;
gameState.timeLeft = GAME_CONFIG.TURN_TIME;
status.innerText = "Listening... Sing now!";
status.classList.remove('text-red-500');

micBtn.classList.add('pulse','bg-red-500');

try{recognition.start()}catch(e){}

startTimer();

}

function stopSinging(){

gameState.isRecording=false;

stopTimer();

try{recognition.stop()}catch(e){}

micBtn.classList.remove('pulse','bg-red-500');

}

recognition.onresult = (event) => {

let phrase="";

for(let i=event.resultIndex;i<event.results.length;++i){

phrase = event.results[i][0].transcript.trim();
if(phrase.length < 5) continue;

if(phrase === gameState.lastPhrase) continue;
gameState.lastPhrase = phrase;

// Always accumulate transcript after validation
if(!gameState.songValidated){

gameState.currentTranscript = phrase;

}else{

if(phrase.length > gameState.currentTranscript.length){

gameState.currentTranscript = phrase;

}

}
    
gameState.lastSpeechTime = Date.now();

let words = phrase.trim().split(/\s+/);
let wordCount = words.length;

if(wordCount > 3){

let lineKey = phrase.toLowerCase();

if(!gameState.lastLineText || !lineKey.startsWith(gameState.lastLineText)){

gameState.linesDetected++;
gameState.lastLineText = lineKey;

// transcript accumulation handled earlier

}

}

if(!gameState.firstWordCaptured){

let words = phrase.split(/\s+/);

if(words.length > 0 && words[0].length > 1){

gameState.firstWordCaptured = true;
handleVoiceInput(phrase);

}

}

}

if(gameState.songValidated && historyList.firstElementChild){
updateHistoryPreview();
}

if(gameState.isRecording)
status.innerText="Heard: "+phrase;

};

setInterval(()=>{

if(!gameState.isRecording) return;

if(!gameState.songValidated) return;

let silence = (Date.now() - gameState.lastSpeechTime)/1000;

if(silence > 5 && gameState.linesDetected >= 2){
endSong();
}

},1000);
    

function handleVoiceInput(text){
validateAndMoveOn(text);
}

function endSong(){

if(!gameState.songValidated){
status.innerText="Start the song correctly first.";
return;
}

if(gameState.linesDetected < 2){
status.innerText="Sing at least two lines before ending.";
return;
}

commitSong();

}

function getLastCompletedLine(text){

let parts = text.trim().split(/\s{2,}|\n/);

if(parts.length > 1){
return parts[parts.length-1];
}

let words = text.trim().split(/\s+/);

if(words.length > 6){
return words.slice(-6).join(" ");
}

return text;

}

function getEndingLetter(line) {
    let words = line.trim().toUpperCase().split(/\s+/);
    let lastWord = words[words.length - 1];
    
    // 1. Try to find the last consonant
    for (let i = lastWord.length - 1; i >= 0; i--) {
        let c = lastWord[i];
        if (/[BCDFGHJKLMNPQRSTVWXYZ]/.test(c)) {
            return c;
        }
    }

    // 2. If no consonant found, try to find the last vowel
    for (let i = lastWord.length - 1; i >= 0; i--) {
        let c = lastWord[i];
        if (/[AEIOU]/.test(c)) {
            return c;
        }
    }

    // 3. Fallback to the very last character or "A"
    return lastWord.charAt(lastWord.length - 1) || "A";
}
    

function commitSong(){

stopSinging();

let transcript = gameState.currentTranscript.trim();

let lastLine = getLastCompletedLine(transcript);

let nextLetter = getEndingLetter(lastLine);

let words = transcript.split(/\s+/);

let preview = transcript;

if(words.length > 8){
let first4 = words.slice(0,4).join(" ");
let last4 = words.slice(-4).join(" ");
preview = first4 + " ... " + last4;
}

    
let firstItem = historyList.firstElementChild;

if(firstItem){
firstItem.innerHTML = `<span>${preview}</span>`;
}

gameState.currentLetter = nextLetter;
updateUI();

status.innerText="🎵 Song ended. Next letter: "+nextLetter;

}

    
function validateAndMoveOn(songPhrase){
if(gameState.songValidated) return;
if (gameState.waitingForRestart) return;
let words=songPhrase.trim().toUpperCase().split(/\s+/);

while(words.length>0 && fillers.includes(words[0])){
words.shift();
}

if(words.length===0) return;

const firstWord=words[0];
const firstChar=firstWord.charAt(0);

let detectedLetter=phoneticMap[firstChar]||firstChar;

let isMatch=(detectedLetter===gameState.currentLetter);

if(!isMatch){
if((gameState.currentLetter==='V'||gameState.currentLetter==='B') && bFamily.includes(firstChar)) isMatch=true;
if((gameState.currentLetter==='T'||gameState.currentLetter==='D') && tFamily.includes(firstChar)) isMatch=true;
}

if(isMatch){

processSuccess(gameState.currentTranscript);
gameState.songValidated = true;
gameState.attempts=0;

}else{

gameState.attempts++;
gameState.waitingForRestart = true;

status.classList.add('text-red-500');

if(gameState.attempts>=GAME_CONFIG.MAX_ATTEMPTS){

status.innerText="❌ Strike 3! Next player's turn.";
stopSinging();

}else{

buzzWrong(firstWord);

}
}

}






    
function processSuccess(cleanSong){

if(gameState.usedSongs.has(normalizeSong(cleanSong))){
status.innerText="Already sung! Try another.";
return;
}

gameState.usedSongs.add(normalizeSong(cleanSong));

let transcript = gameState.currentTranscript.trim();
let words = transcript.split(/\s+/);

let preview = transcript;

if(words.length > 8){
let first4 = words.slice(0,4).join(" ");
let last4 = words.slice(-4).join(" ");
preview = first4 + " ... " + last4;
}

// Next letter will be determined when the song ends
let nextLetter = null;

gameState.songValidated = true;
gameState.firstWordCaptured = false;

const li=document.createElement('li');

li.className="bg-slate-800 p-3 rounded-xl border border-slate-700 flex justify-between items-center mb-2 animate-fadeIn";

li.innerHTML=`<span>Listening...</span>`;
historyList.prepend(li);

// gameState.currentLetter = nextLetter;
// updateUI();
// Letter update happens at song commit

status.innerText="✅ Correct start! Keep singing...";
}




function updateHistoryPreview(){

let transcript = gameState.currentTranscript.trim();
let words = transcript.split(/\s+/);

let preview = transcript;

if(words.length > 8){
let first4 = words.slice(0,4).join(" ");
let last4 = words.slice(-4).join(" ");
preview = first4 + " ... " + last4;
}

let firstItem = historyList.firstElementChild;

if(firstItem){
firstItem.innerHTML = `<span>${preview}</span>`;
}

}
    

function skipLetter(){

gameState.currentLetter=getRandomLetter();

updateUI();

status.innerText="New letter: "+gameState.currentLetter;

}

function resetGame(){

if(confirm("Reset game?")){

gameState.usedSongs.clear();

historyList.innerHTML="";

skipLetter();

}

}

</script>

</body>
</html>
