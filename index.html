<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Antakshari AI 2026</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>

#buzzerOverlay{
animation: buzzFlash 1.6s ease;
}

@keyframes buzzFlash{
0%{opacity:0; transform:scale(0.95);}
15%{opacity:1; transform:scale(1);}
70%{opacity:1; transform:scale(1);}
100%{opacity:0; transform:scale(1.03);}
}

    
body { 
touch-action: manipulation; 
overflow: hidden; 
overscroll-behavior: none; 
}

button{
touch-action: manipulation;
-webkit-tap-highlight-color: transparent;
}

.pulse { animation: pulse 1.5s infinite; }

@keyframes pulse {
0%,100%{transform:scale(1);opacity:1;}
50%{transform:scale(1.1);opacity:.8;}
}

.animate-fadeIn { animation: fadeIn 0.3s ease-in; }

@keyframes fadeIn{
from{opacity:0;transform:translateY(-10px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<div id="buzzerOverlay" class="fixed inset-0 bg-red-700 bg-opacity-90 hidden flex items-center justify-center z-50">
    <div class="text-center">
        <div class="text-7xl font-black mb-4">❌</div>
        <div id="buzzerText" class="text-2xl font-bold"></div>
    </div>
</div>    

<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col items-center p-6">

<header class="text-center mb-6">
<h1 class="text-4xl font-bold text-yellow-400 tracking-tight">Antakshari AI</h1>
<p class="text-slate-400 text-sm">Lightweight Social Edition</p>
</header>

<div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border border-slate-700 relative">

<div class="w-full bg-slate-700 h-1.5 rounded-full mb-6 overflow-hidden">
<div id="timerBar" class="bg-yellow-500 h-full w-0 transition-all duration-100"></div>
</div>

<div class="mb-4">
<span class="text-xs uppercase tracking-[0.2em] text-slate-500 font-bold">Current Letter</span>
<div id="currentLetter" class="text-9xl font-black text-white mt-2 transition-all">M</div>
</div>

<button id="micBtn" class="bg-yellow-500 hover:bg-yellow-400 text-slate-900 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 transition-all active:scale-95 shadow-lg">
<svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" viewBox="0 0 20 20" fill="currentColor">
<path d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 005 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-2v-2.07z"/>
</svg>
</button>

<p id="status" class="text-yellow-200 italic h-12 mb-4 text-sm font-medium px-4 flex items-center justify-center leading-tight">
Tap to start singing...
</p>

<div class="flex gap-2 justify-center">
<button onclick="skipLetter()" class="text-xs bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-full text-slate-300">Skip</button>
<button onclick="resetGame()" class="text-xs bg-red-900/30 hover:bg-red-900/50 px-4 py-2 rounded-full text-red-400 border border-red-900/50">Reset</button>
</div>

</div>

<div class="mt-8 w-full max-w-md overflow-hidden">
<h3 class="text-sm font-bold mb-4 text-slate-500 uppercase tracking-widest">Played Songs</h3>
<ul id="history" class="space-y-2 max-h-60 overflow-y-auto pr-2"></ul>
</div>

<script>

function buzzWrong(firstWord){

status.innerText=`❌ Wrong start! Heard "${firstWord}"`;

buzzerText.innerText=`Heard: "${firstWord}"`;
buzzerOverlay.classList.remove("hidden");

const ctx = new (window.AudioContext || window.webkitAudioContext)();

function playNote(freq, start, duration){
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0.12, ctx.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + duration);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start(ctx.currentTime + start);
    osc.stop(ctx.currentTime + start + duration);
}

playNote(660, 0.00, 0.15);   // E
playNote(550, 0.15, 0.15);   // C#
playNote(440, 0.30, 0.20);   // A

    
recognition.abort();

setTimeout(()=>{

buzzerOverlay.classList.add("hidden");

if(gameState.isRecording){
gameState.waitingForRestart=false;
recognition.start();
}

},1600);

}

function startTimer(){

gameState.timerInterval = setInterval(()=>{

gameState.timeLeft -= .1;

timerBar.style.width =
((GAME_CONFIG.TURN_TIME-gameState.timeLeft)/GAME_CONFIG.TURN_TIME)*100+"%";

if(gameState.timeLeft<=0){

status.innerText="Time Up! Next player.";
stopSinging();

}

},100);

}

function stopTimer(){

clearInterval(gameState.timerInterval);

timerBar.style.width="0%";

}

    

const GAME_CONFIG = {
TURN_TIME: 30,
MAX_ATTEMPTS: 3
};

const alphabets = {
latin: "ABCDEFGHIJKLMNOPQRSTUVWXYZ"
};

const alphabet = alphabets.latin;

const gameState = {
currentLetter: "M",
usedSongs: new Set(),
isRecording: false,
timerInterval: null,
timeLeft: GAME_CONFIG.TURN_TIME,
attempts: 0,
waitingForRestart: false
};

const phoneticMap = { 
'म':'M','न':'N','क':'K','ख':'K','ग':'G','घ':'G',
'च':'C','छ':'C','ज':'J','झ':'J','त':'T','थ':'T',
'द':'D','ध':'D','प':'P','ब':'B','भ':'B','व':'V',
'य':'Y','र':'R','ल':'L','स':'S','ह':'H','अ':'A','आ':'A'
};

const fillers = ["अह","उम","ओह","UH","UM","OH","THE"];

const bFamily = ['ब','भ','व','प','फ','B','V','P'];
const tFamily = ['त','थ','ट','ठ','T','D','द','ध','ड','ढ'];

const micBtn = document.getElementById('micBtn');
const status = document.getElementById('status');
const letterDisplay = document.getElementById('currentLetter');
const historyList = document.getElementById('history');
const timerBar = document.getElementById('timerBar');
const buzzerOverlay = document.getElementById('buzzerOverlay');
const buzzerText = document.getElementById('buzzerText');

    
function updateUI(){
letterDisplay.innerText = gameState.currentLetter;
}

function normalizeSong(song){
return song.toLowerCase().replace(/[^a-z0-9]/g,'');
}

function getRandomLetter(){
const index = Math.floor(Math.random()*alphabet.length);
return alphabet[index];
}

function restartRecognition(){
    recognition.abort();
    setTimeout(()=>{
    if(gameState.isRecording){
        gameState.waitingForRestart = false;
        recognition.start();
    }
},150);
}

function createSpeechEngine(){
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
return new SpeechRecognition();
}

const recognition = createSpeechEngine();
recognition.lang = 'hi-IN';
recognition.continuous = true;
recognition.interimResults = true;

micBtn.onclick = () => {
if(!gameState.isRecording) startSinging();
else stopSinging();
};

function startSinging(){

gameState.attempts = 0;
gameState.waitingForRestart = false;
gameState.isRecording = true;
gameState.timeLeft = GAME_CONFIG.TURN_TIME;

status.innerText = "Listening... Sing now!";
status.classList.remove('text-red-500');

micBtn.classList.add('pulse','bg-red-500');

try{recognition.start()}catch(e){}

startTimer();

}

function stopSinging(){

gameState.isRecording=false;

stopTimer();

try{recognition.stop()}catch(e){}

micBtn.classList.remove('pulse','bg-red-500');

}

recognition.onresult = (event) => {

let phrase="";

for(let i=event.resultIndex;i<event.results.length;++i){

phrase=event.results[i][0].transcript.trim();

if(event.results[i].isFinal){

handleVoiceInput(phrase);

}

}

if(gameState.isRecording)
status.innerText="Heard: "+phrase;

};

function handleVoiceInput(text){
validateAndMoveOn(text);
}

function validateAndMoveOn(songPhrase){
if (gameState.waitingForRestart) return;
let words=songPhrase.trim().toUpperCase().split(/\s+/);

while(words.length>0 && fillers.includes(words[0])){
words.shift();
}

if(words.length===0) return;

const firstWord=words[0];
const firstChar=firstWord.charAt(0);

let detectedLetter=phoneticMap[firstChar]||firstChar;

let isMatch=(detectedLetter===gameState.currentLetter);

if(!isMatch){
if((gameState.currentLetter==='V'||gameState.currentLetter==='B') && bFamily.includes(firstChar)) isMatch=true;
if((gameState.currentLetter==='T'||gameState.currentLetter==='D') && tFamily.includes(firstChar)) isMatch=true;
}

if(isMatch){

processSuccess(songPhrase);
gameState.attempts=0;

}else{

gameState.attempts++;
gameState.waitingForRestart = true;

status.classList.add('text-red-500');

if(gameState.attempts>=GAME_CONFIG.MAX_ATTEMPTS){

status.innerText="❌ Strike 3! Next player's turn.";
stopSinging();

}else{

buzzWrong(firstWord);

}
}

}

function processSuccess(cleanSong){

if(gameState.usedSongs.has(normalizeSong(cleanSong))){
status.innerText="Already sung! Try another.";
return;
}

gameState.usedSongs.add(normalizeSong(cleanSong));

let nextLetter="A";

for(let i=cleanSong.length-1;i>=0;i--){

let mapped=phoneticMap[cleanSong[i]]||cleanSong[i].toUpperCase();

if(alphabet.includes(mapped)){
nextLetter=mapped;
break;
}

}

gameState.currentLetter=nextLetter;

updateUI();

const li=document.createElement('li');

li.className="bg-slate-800 p-3 rounded-xl border border-slate-700 flex justify-between items-center mb-2 animate-fadeIn";

li.innerHTML=`<span>${cleanSong}</span>
<span class="bg-yellow-500 text-slate-900 px-2 py-0.5 rounded text-xs font-bold">${gameState.currentLetter}</span>`;

historyList.prepend(li);

stopSinging();

status.innerText="Accepted! Next: "+nextLetter;

}

function skipLetter(){

gameState.currentLetter=getRandomLetter();

updateUI();

status.innerText="New letter: "+gameState.currentLetter;

}

function resetGame(){

if(confirm("Reset game?")){

gameState.usedSongs.clear();

historyList.innerHTML="";

skipLetter();

}

}

</script>

</body>
</html>
