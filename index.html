<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Antakshari AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{touch-action:manipulation;overflow:hidden}
.pulse{animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
</style>
</head>

<body class="bg-slate-900 text-white flex flex-col items-center p-6">

<h1 class="text-3xl text-yellow-400 font-bold mb-4">Antakshari AI</h1>

<div class="bg-slate-800 p-6 rounded-xl w-full max-w-md text-center">

<div class="text-xs text-slate-400 uppercase">Current Letter</div>
<div id="letter" class="text-8xl font-black my-3">M</div>

<button id="mic"
class="bg-yellow-500 text-black w-24 h-24 rounded-full mx-auto flex items-center justify-center text-xl font-bold">
🎤
</button>

<p id="status" class="text-yellow-200 mt-4 h-10">
Tap mic to sing
</p>

<div class="flex justify-center gap-3 mt-4">

<button onclick="Game.endSong()"
class="bg-yellow-700 px-4 py-2 rounded">
End
</button>

<button onclick="Game.skipLetter()"
class="bg-slate-700 px-4 py-2 rounded">
Skip
</button>

<button onclick="Game.reset()"
class="bg-red-700 px-4 py-2 rounded">
Reset
</button>

</div>

</div>

<div class="mt-6 w-full max-w-md">

<h3 class="text-slate-400 text-sm mb-2 uppercase">Played Songs</h3>

<ul id="history" class="space-y-2"></ul>

</div>

<script>

/* -----------------------------
STATE
----------------------------- */

const State = {

currentLetter:"M",
recording:false,
songValidated:false,
linesDetected:0,
lastSpeechTime:0,
attempts:0,
transcript:"",
lastPhrase:"",
usedSongs:new Set()

}

/* -----------------------------
UI LAYER
----------------------------- */

const UI = {

status(msg){
document.getElementById("status").innerText = msg
},

updateLetter(){
document.getElementById("letter").innerText = State.currentLetter
},

previewTranscript(text){

const history=document.getElementById("history")
const item=history.firstElementChild
if(!item) return

let words=text.split(/\s+/)

let preview=text

if(words.length>8){

preview=words.slice(0,4).join(" ")
+" ... "+
words.slice(-4).join(" ")

}

item.querySelector("span").innerText=preview

},

addListening(){

const li=document.createElement("li")

li.className="bg-slate-800 p-3 rounded"

li.innerHTML="<span>Listening...</span>"

document.getElementById("history").prepend(li)

},

commitSong(text){

let words=text.split(/\s+/)

let preview=text

if(words.length>8){

preview=words.slice(0,4).join(" ")
+" ... "+
words.slice(-4).join(" ")

}

document.querySelector("#history li span").innerText=preview

}

}

/* -----------------------------
TRANSCRIPT MANAGER
----------------------------- */

const Transcript = {

update(phrase){

if(phrase.length > State.transcript.length){

State.transcript = phrase.trim()

}

}

}

/* -----------------------------
GAME ENGINE
----------------------------- */

const Game = {

start(){

State.recording=true
State.songValidated=false
State.linesDetected=0
State.transcript=""
State.lastPhrase=""
State.lastSpeechTime=Date.now()

UI.status("Listening... Sing now")

Speech.start()

},

stop(){

State.recording=false
Speech.stop()

},

validateStart(phrase){

let words=phrase.toUpperCase().split(/\s+/)

const first=words[0][0]

if(first===State.currentLetter){

State.songValidated=true
UI.addListening()
UI.status("Correct start! Keep singing")

}else{

State.attempts++

UI.status("Wrong start")

if(State.attempts>=3){

Game.stop()

}

}

},

detectLines(phrase){

if(phrase.length-State.lastPhrase.length>15){

State.linesDetected++

}

State.lastPhrase=phrase

},

checkSilence(){

if(!State.recording) return

const silence=(Date.now()-State.lastSpeechTime)/1000

if(silence>5 && State.linesDetected>=2){

Game.endSong()

}

},

endSong(){

if(!State.songValidated && !State.firstWordCaptured){

let words = phrase.trim().split(/\s+/)

if(words.length>0){

State.firstWordCaptured = true

Game.validateStart(words[0])

}

}

if(State.linesDetected<2){

UI.status("Sing at least 2 lines")

return

}

Game.commit()

},

commit(){

Game.stop()

const transcript=State.transcript

UI.commitSong(transcript)

const lastLine = transcript.split(/\n|  /).pop()

const next = Game.getNextLetter(lastLine)

State.currentLetter=next

UI.updateLetter()

UI.status("Next letter: "+next)

},

getNextLetter(text){

let words=text.trim().toUpperCase().split(/\s+/)

let last=words[words.length-1]

for(let i=last.length-1;i>=0;i--){

let c=last[i]

if(/[BCDFGHJKLMNPQRSTVWXYZ]/.test(c)) return c

}

for(let i=last.length-1;i>=0;i--){

let c=last[i]

if(/[AEIOU]/.test(c)) return c

}

return "A"

},

skipLetter(){

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ"

State.currentLetter=
letters[Math.floor(Math.random()*letters.length)]

UI.updateLetter()

},

reset(){

document.getElementById("history").innerHTML=""
State.usedSongs.clear()
Game.skipLetter()

}

}

/* -----------------------------
SPEECH ENGINE
----------------------------- */

const Speech = {

recognition:null,

init(){

const SR=window.SpeechRecognition||window.webkitSpeechRecognition

this.recognition=new SR()

this.recognition.lang="hi-IN"
this.recognition.interimResults=true
this.recognition.maxAlternatives=1
this.recognition.continuous=true
this.recognition.interimResults=true

this.recognition.onresult = (event) => {

let phrase = ""

for (let i = event.resultIndex; i < event.results.length; i++) {

phrase += event.results[i][0].transcript

}

phrase = phrase.trim()

if (phrase.length < 3) return

State.lastSpeechTime = Date.now()

Transcript.update(phrase)

Game.detectLines(phrase)

if (!State.songValidated) {

Game.validateStart(phrase)

}

if (State.songValidated) {

UI.previewTranscript(State.transcript)

}

}

},

start(){

try{this.recognition.start()}catch{}

},

stop(){

try{this.recognition.stop()}catch{}

}

}

/* -----------------------------
EVENTS
----------------------------- */

document.getElementById("mic").onclick=()=>{

if(!State.recording) Game.start()
else Game.stop()

}

Speech.init()

setInterval(Game.checkSilence,1000)

</script>

</body>
</html>
