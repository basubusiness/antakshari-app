<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antakshari Lite 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col items-center p-6">

    <header class="text-center mb-8">
        <h1 class="text-4xl font-bold text-yellow-400">Antakshari AI</h1>
        <p class="text-slate-400">Sing the song starting with the letter below!</p>
    </header>

    <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border border-slate-700">
        <div class="mb-4">
            <span class="text-sm uppercase tracking-widest text-slate-400">Current Letter</span>
            <div id="currentLetter" class="text-8xl font-black text-white mt-2">M</div>
        </div>

        <button id="micBtn" class="bg-yellow-500 hover:bg-yellow-400 text-slate-900 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 transition-all active:scale-95 shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
        </button>

        <p id="status" class="text-yellow-200 italic h-6">Tap the mic to sing...</p>
    </div>

    <div class="mt-8 w-full max-w-md">
        <h3 class="text-lg font-semibold mb-4 text-slate-400">Song History</h3>
        <ul id="history" class="space-y-2">
            </ul>
    </div>

    <script>
        let currentLetter = "M";
        const usedSongs = new Set();
        
        const micBtn = document.getElementById('micBtn');
        const status = document.getElementById('status');
        const letterDisplay = document.getElementById('currentLetter');
        const historyList = document.getElementById('history');

        // Speech Recognition Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'hi-IN'; // Set to Hindi/Indian English context

        micBtn.onclick = () => {
            recognition.start();
            status.innerText = "Listening...";
            micBtn.classList.add('pulse', 'bg-red-500');
        };

        recognition.onresult = (event) => {
            const song = event.results[0][0].transcript;
            processSong(song);
        };

        recognition.onend = () => {
            micBtn.classList.remove('pulse', 'bg-red-500');
        };

        function processSong(song) {
            const firstChar = song.trim().charAt(0).toUpperCase();
            
            // 1. Validate starting letter
            if (firstChar !== currentLetter) {
                status.innerText = `Error: Song must start with ${currentLetter}!`;
                return;
            }

            // 2. Duplicate Check
            if (usedSongs.has(song.toLowerCase())) {
                status.innerText = "Already sung! Try another.";
                return;
            }

            // 3. Update State
            usedSongs.add(song.toLowerCase());
            const lastChar = song.trim().slice(-1).toUpperCase();
            currentLetter = lastChar;
            
            // 4. Update UI
            letterDisplay.innerText = currentLetter;
            status.innerText = "Nice! Next player...";
            
            const li = document.createElement('li');
            li.className = "bg-slate-800 p-3 rounded-lg border-l-4 border-yellow-500 flex justify-between";
            li.innerHTML = `<span>${song}</span> <span class="text-yellow-500 font-bold">→ ${lastChar}</span>`;
            historyList.prepend(li);
        }
    </script>
</body>
</html>
